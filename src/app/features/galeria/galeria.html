<div class="page-wrapper">

  <header class="page-header">
    <div class="header-content">
      <h1>Nuestra Galería</h1>
      <div class="divider"></div>
      <p class="header-subtitle">Momentos inolvidables vividos en Hacienda El Toro</p>
    </div>
  </header>

  <div class="galeria-masonry">
    <div class="galeria-item" *ngFor="let img of imagenes; let i = index" (click)="openGallery(i)">
      <div class="img-overlay">
        <span>Ver en grande</span>
      </div>
      <img [src]="img" alt="Momento Hacienda El Toro">
    </div>
  </div>

  <div class="modal-overlay" *ngIf="isModalOpen" (click)="closeGallery()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <button class="btn-close" (click)="closeGallery()">×</button>
      <button class="btn-prev" (click)="prevImage()">&#10094;</button>

      <div class="modal-image-container">
        <img [src]="imagenes[currentImageIndex]" alt="Galería Hacienda El Toro">
        <div class="image-counter">{{ currentImageIndex + 1 }} / {{ imagenes.length }}</div>
      </div>

      <button class="btn-next" (click)="nextImage()">&#10095;</button>
    </div>
  </div>

</div>
